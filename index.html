<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>countdown</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section id="section">
        <div class="countdown">
            <img src="phone.jpg" alt="">
            <article class="myarticle">
                <h1>Old phone giveaway</h1>
                <p class="giveaway">giveaway ends on tuesday, 14 january 2025 11:30pm</p>
                <p>Enter now and the countdown is on until the giveaway ends!</p>
                <div class="cloclbox">
                    <div class="mybox">
                        <h1 id="days"> 01</h1>
                        <p>Days</p>
                    </div>
                    <div class="mybox">
                        <h1 id="hours"> 24</h1>
                        <p>hours</p>
                    </div>
                    <div class="mybox">
                        <h1 id="mins">24</h1>
                        <p>mins</p>
                    </div>
                    <div class="mybox">
                        <h1 id="seconds"> 45</h1>
                        <p>sec</p>
                    </div>
                </div>
            </article>
        </div>
    </section>
    


    <script src="./script.js"></script>
</body>
</html>
